# Note: Phlare was renamed to Pyroscope upstream. Migrate to grafana/pyroscope
# when this component is next touched.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phlare
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: phlare
    targetRevision: 0.5.4
  destination:
    server: https://kubernetes.default.svc
    namespace: phlare
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
