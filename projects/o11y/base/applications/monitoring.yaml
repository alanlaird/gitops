apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/alanlaird/gitops
    targetRevision: main
    # Overlays point this at their own glue overlay for cluster-specific
    # storage/retention on the VMSingle.
    path: projects/o11y/base/glue/victoriametrics
  destination:
    server: https://kubernetes.default.svc
    namespace: victoriametrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
