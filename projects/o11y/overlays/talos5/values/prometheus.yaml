apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  source:
    helm:
      values: |
        grafana:
          service:
            type: ClusterIP
          adminPassword: admin
          sidecar:
            dashboards:
              enabled: true
              defaultDashboardsEnabled: true
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Loki
                  type: loki
                  url: http://loki.loki.svc:3100
                - name: VictoriaMetrics
                  type: prometheus
                  url: http://vmsingle-database.victoriametrics.svc:8429
                - name: Tempo
                  type: tempo
                  url: http://tempo.tempo.svc:3100
                - name: Phlare
                  type: phlare
                  url: http://phlare.phlare.svc:4100
        prometheus:
          prometheusSpec:
            retention: 24h
        # talos5: single CP at 172.16.16.51
        kubeEtcd:
          endpoints:
            - 172.16.16.51
          service:
            port: 2381
            targetPort: 2381
        kubeControllerManager:
          endpoints:
            - 172.16.16.51
        kubeScheduler:
          endpoints:
            - 172.16.16.51
