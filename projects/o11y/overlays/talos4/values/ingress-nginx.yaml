apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  source:
    helm:
      values: |
        controller:
          replicaCount: 1
          config:
            use-forwarded-headers: "true"
          service:
            type: LoadBalancer
            annotations:
              # Pinned to the stable ingress VIP — matches the *.laird.net DNS wildcard.
              metallb.universe.tf/loadBalancerIPs: "172.16.16.200"
