apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-lb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/alanlaird/gitops
    targetRevision: main
    path: projects/o11y/components/ingress/glue/vmsingle-lb
  destination:
    server: https://kubernetes.default.svc
    namespace: victoriametrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
